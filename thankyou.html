<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>訂單已送出｜雷巴咖啡</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <h1>雷巴咖啡</h1>
    <p class="hero-sub">高捷福委濾掛咖啡團購</p>
  </header>

  <main class="container">
    <section class="notice-card" style="text-align:center;">
      <p style="font-size:1.2rem; font-weight:700;">感謝您的訂購！</p>
      <p>您的付款已送出，我們正在確認付款結果。</p>
      <p id="trade-no-line"></p>
      <p>付款結果確認後，系統會寄送 Email 通知；若有任何問題，請聯繫福委窗口。</p>
      <p><a href="index.html">回到訂購頁</a></p>
    </section>
  </main>

  <footer class="site-footer">
    <p>雷巴咖啡 × 高雄捷運福利委員會</p>
  </footer>

  <script>
    const params = new URLSearchParams(location.search);
    const tradeNo = params.get("MerchantTradeNo");
    if (tradeNo) {
      document.getElementById("trade-no-line").textContent = `訂單編號：${tradeNo}`;
    }
  </script>
</body>
</html>
